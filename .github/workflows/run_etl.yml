name: Room Database ETL

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # allow the workflow to commit & push the refreshed CSVs

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run ETL ───────────────────────────────────────────────
      - name: Run ETL
        env:
          PSL_API_TOKEN: ${{ secrets.PSL_API_TOKEN }}
        run: python etl.py

      # ── 5. Rename outputs to fixed filenames (no timestamp) ──────
      #    This keeps the CSV paths stable so consumers always know
      #    exactly where to find the latest data.
      - name: Promote outputs to latest
        run: |
          mkdir -p output
          # Pick the newest timestamped file (the 2* glob excludes *_latest.csv,
          # which is checked out from a previous run).
          cp "$(ls -t output/rooms_2*.csv     | head -1)" output/rooms_latest.csv
          cp "$(ls -t output/contracts_2*.csv | head -1)" output/contracts_latest.csv

      # ── 6. Commit & push CSVs back to repo ──────────────────────
      - name: Commit updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only the *_latest.csv files are tracked; the timestamped run files
          # are intentionally gitignored, so don't try to stage them.
          git add output/rooms_latest.csv output/contracts_latest.csv
          git diff --cached --quiet || git commit -m "chore: update room data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
